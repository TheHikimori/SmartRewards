# SmartRewards — настройка GUI (Triumph GUI)

main-menu:
  title: "<gradient:#FFD700:#FF8C00>SmartRewards</gradient>"
  rows: 6
  filler-template: filler
  items:
    calendar:
      slot: 22
      template: none
      material: CLOCK
      name: "<yellow>Календарь наград</yellow>"
      lore:
        - "<gray>Нажмите, чтобы открыть</gray>"
        - "<gray>Серия: <yellow>{streak}</yellow></gray>"
      custom-model-data: 0
      action: OPEN_CALENDAR
    streak-info:
      slot: 4
      material: EXPERIENCE_BOTTLE
      name: "<gold>Серия: {streak} дней</gold>"
      lore:
        - "<gray>Следующая: <yellow>{next}</yellow></gray>"
      action: NONE
    claim:
      slot: 40
      material: EMERALD
      name: "<green>Получить награду</green>"
      lore:
        - "<gray>Забрать сегодняшнюю награду</gray>"
      action: CLAIM
    close:
      slot: 49
      material: BARRIER
      name: "<red>Закрыть</red>"
      action: CLOSE

calendar:
  title: "<gradient:#FFD700:#FF8C00>Календарь наград</gradient> <gray>(Серия: {streak})</gray>"
  rows: 6
  filler-template: filler
  # Слоты для дней 1-28 (4 ряда по 7)
  day-slots:
    - 10
    - 11
    - 12
    - 13
    - 14
    - 15
    - 16
    - 19
    - 20
    - 21
    - 22
    - 23
    - 24
    - 25
    - 28
    - 29
    - 30
    - 31
    - 32
    - 33
    - 34
    - 37
    - 38
    - 39
    - 40
    - 41
    - 42
    - 43
  states:
    claimed:
      template: claimed
    available:
      template: available
    locked:
      template: locked
    today:
      template: today
    missed:
      material: ORANGE_STAINED_GLASS_PANE
      name: "<gold>Пропущено</gold>"
  navigation:
    back:
      slot: 45
      material: ARROW
      name: "<yellow>Назад</yellow>"
      action: BACK
    claim:
      slot: 49
      material: EMERALD
      name: "<green>Получить</green>"
      action: CLAIM

editor:
  title: "<red>Редактор наград</red>"
  rows: 3
  enabled: true
